<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoEdu | Adjustment Kerangka Kontrol Geodesi</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">

  <!-- MathJax Config -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        typeset: false
      }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body class="slide-body">

<nav class="navbar navbar-dark geo-navbar px-3">
  <a class="navbar-brand fw-bold" href="index.html">
    <i class="bi bi-globe-asia-australia me-2"></i>GeoEdu
  </a>

  <div class="d-flex gap-2">
    <a id="backToCourse" class="btn btn-outline-light btn-sm" href="course.html">
      <i class="bi bi-arrow-left me-1"></i>Pertemuan
    </a>

    <button class="btn btn-warning btn-sm" onclick="downloadPDF()">
      <i class="bi bi-file-earmark-pdf me-1"></i>Download PDF
    </button>

    <button class="btn btn-light btn-sm" onclick="toggleFullscreen()">
      <i class="bi bi-fullscreen"></i>
    </button>
  </div>
</nav>

<main class="slide-wrapper">
  <aside class="slide-sidebar d-none d-lg-block">
    <h6 class="text-uppercase text-muted">Outline Slide</h6>
    <div id="slideThumbs"></div>
  </aside>

  <section class="slide-stage">
    <div class="slide-card shadow-lg">
      <div class="slide-number" id="slideCounter">1 / 12</div>
      <div id="slideContent"></div>
    </div>

    <div class="slide-controls">
      <button class="btn btn-outline-light" onclick="prevSlide()">
        <i class="bi bi-chevron-left"></i> Sebelumnya
      </button>

      <button class="btn btn-light" onclick="nextSlide()">
        Berikutnya <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- App utama -->
<script src="assets/app.js"></script>

<!-- MathJax Repair Script -->
<script>
  function repairMathArtifacts() {
    const slideContent = document.getElementById("slideContent");
    if (!slideContent) return;

    let html = slideContent.innerHTML;

    html = html
      .replace(/begin\s*:\s*math\s*:\s*display/gi, '\\[')
      .replace(/\$?end\s*:\s*math\s*:\s*display\$?/gi, '\\]')
      .replace(/begin\s*:\s*math\s*:\s*text/gi, '\\(')
      .replace(/begin\s*:\s*math\s*:\s*textv/gi, '\\(v')
      .replace(/begin\s*:\s*math\s*:\s*textP/gi, '\\(P')
      .replace(/begin\s*:\s*math\s*:\s*text\\Phi/gi, '\\(\\Phi')
      .replace(/end\s*:\s*math\s*:\s*text/gi, '\\)')
      .replace(/\\Phi/g, '\\Phi')
      .replace(/\\sum/g, '\\sum')
      .replace(/\\frac/g, '\\frac')
      .replace(/\\hat/g, '\\hat')
      .replace(/\\sigma/g, '\\sigma');

    slideContent.innerHTML = html;

    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetClear([slideContent]);
      MathJax.typesetPromise([slideContent]);
    }
  }

  const originalRenderSlide = window.renderSlide;

  window.renderSlide = function () {
    if (typeof originalRenderSlide === "function") {
      originalRenderSlide();
    }

    setTimeout(repairMathArtifacts, 150);
  };

  document.addEventListener("DOMContentLoaded", function () {
    setTimeout(repairMathArtifacts, 500);
  });
</script>

</body>
</html>
