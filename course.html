<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoEdu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

<h1 id="courseTitle"></h1>

<div class="row g-3 mt-4" id="meetingList"></div>

</div>

<script>
const params = new URLSearchParams(location.search);
const course = params.get("course");

document.getElementById("courseTitle").innerText =
course.toUpperCase();

const box = document.getElementById("meetingList");

for(let i=1;i<=16;i++){
box.innerHTML += `
<div class="col-md-3">
<a href="lesson.html?course=${course}&meeting=${i}"
class="btn btn-light border w-100 p-3 rounded-4 shadow-sm">
Pertemuan ${i}
</a>
</div>
`;
}
</script>

</body>
</html>
