<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoEdu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark geo-navbar px-4">
  <a class="navbar-brand fw-bold" href="#">
    GeoEdu
  </a>
</nav>

<section class="container py-5">
  <h1 class="mb-4">Daftar Mata Kuliah</h1>

  <div class="row g-4" id="courseList"></div>
</section>

<script src="data/courses.js"></script>

<script>
const box = document.getElementById("courseList");

courses.forEach(course => {
  box.innerHTML += `
    <div class="col-md-4">
      <div class="card h-100 shadow border-0 rounded-4">
        <div class="card-body">
          <h4>${course.name}</h4>
          <p>${course.desc}</p>

          <a href="course.html?course=${course.id}" class="btn btn-primary">
            Buka Mata Kuliah
          </a>
        </div>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
